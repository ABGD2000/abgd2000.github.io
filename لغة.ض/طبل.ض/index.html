    موجة = قائمة(عدد_العينات)

        زمن = (س-1) / معدل_العينات
        عينة = 0.9 * جا(2*ط*تردد_أساسي*زمن) + 0.3 * جا(2*ط*تردد_أساسي*2*زمن)
        عينة = عينة * جهارة * 30000
        لو س   <= عدد_العينات * 0.2
            عينة = عينة * (i / (عدد_العينات*0.2))
        تم
        لو س   > عدد_العينات * 0.7
            عينة = عينة * (1 - (i - عدد_العينات*0.7) / (عدد_العينات*0.3))
        تم
        موجة[س] = السابق(عينة)
    دور
    مرر  موجة
تم

دالة  صوت_كا_تخيلي(مدة, جهارة)
    تردد_أساسي = 1200
    عدد_العينات = السابق(مدة * معدل_العينات)
    موجة = قائمة(عدد_العينات)
    من س   = 1 إلى   عدد_العينات
        زمن = (س-1) / معدل_العينات
        عينة = 0.8 * جا(2*ط*تردد_أساسي*زمن) + 0.2 * جا(2*ط*تردد_أساسي*2*زمن)
        عينة = عينة * جهارة * 28000
        لو س   <= عدد_العينات * 0.15
            عينة = عينة * (i / (عدد_العينات*0.15))
        تم
        لو س   > عدد_العينات * 0.6
            عينة = عينة * (1 - (i - عدد_العينات*0.6) / (عدد_العينات*0.4))
        تم
        موجة[س] = السابق(عينة)
    دور
    مرر  موجة
تم

دالة  صوت_سك_تخيلي(مدة, جهارة)
    تردد_أساسي = 600
    عدد_العينات = السابق(مدة * معدل_العينات)
    موجة = قائمة(عدد_العينات)
    من س   = 1 إلى   عدد_العينات
        زمن = (س-1) / معدل_العينات
        عينة = 0.6 * جا(2*ط*تردد_أساسي*زمن)
        عينة = عينة * جهارة * 20000
        لو س   <= عدد_العينات * 0.1
            عينة = عينة * (i / (عدد_العينات*0.1))
        تم
        لو س   > عدد_العينات * 0.5
            عينة = عينة * (1 - (i - عدد_العينات*0.5) / (عدد_العينات*0.5))
        تم
        موجة[س] = السابق(عينة)
    دور
    مرر  موجة
تم

دالة  صوت_رول_تخيلي(مدة, جهارة, نوع)
    تردد_النقرات = 20  
    عدد_النقرات = السابق(مدة * تردد_النقرات)
    مدة_النقرة = 1.0 / تردد_النقرات
    موجة = []
    من نقرة = 1 إلى   عدد_النقرات
        لو نوع = "دم"
            جزء = صوت_دم_تخيلي(مدة_النقرة * 0.8, جهارة * 0.6)
        لا 
            جزء = صوت_تك_تخيلي(مدة_النقرة * 0.6, جهارة * 0.5)
        تم
        من ع في جزء
            موجة + ع
        دور
        من ص = 1 إلى   السابق(0.005 * معدل_العينات)
            موجة + 0
        دور
    دور
    لو طول(موجة) > السابق(مدة * معدل_العينات)
        موجة = موجة[1:السابق(مدة * معدل_العينات)]
    تم
    مرر  موجة
تم

// ==========================================
// ثالثاً: دالة السكتة (ثابتة لا تتغير)
// ==========================================


دالة  صوت_سكتة(مدة)
    عدد_العينات = السابق(مدة * معدل_العينات)
    مرر  قائمة(عدد_العينات)   // كلها أصفار
تم

// دالة لتوزيع الصوت حسب الرمز
دالة  احصل_موجة_ضربة(رمز, مدة, جهارة)
    جهارة = 0.8
    مدة_أساسية = مدة * 0.9   // مدة الضربة أقل بقليل من النبضة للسماح بفصل الأصوات
    لو رمز = "دم"
        مرر  صوت_دم(مدة_أساسية, جهارة)
    إذا  رمز = "تك"
        مرر  صوت_تك(مدة_أساسية, جهارة)
    إذا  رمز = "كا"
        مرر  صوت_كا(مدة_أساسية, جهارة)
    إذا  رمز = "سك"
        مرر  صوت_سك(مدة_أساسية, جهارة)
    إذا  رمز = "رول"
        مرر  صوت_رول(مدة_أساسية, جهارة, "دم")   // يمكن تمرير النوع حسب السياق
    لا 
        مرر  صوت_سكتة(مدة)
    تم
تم

// --------------------- 4. دالة توليد إيقاع كامل ---------------------
دالة  توليد_إيقاع_كامل(بيانات_الإيقاع, سرعة_بي_ام_بي, عدد_الدورات)
    // بيانات_الإيقاع = [الاسم, لاتيني, ميزان, عدد_النبضات, قائمة_الضربات, المنطقة, التصنيف, سرعة_دنيا, سرعة_قصوى]
    ضربات = بيانات_الإيقاع[5]
    عدد_الضربات = طول(ضربات)
    
    // تحليل الميزان لمعرفة قيمة النبضة الأساسية
    // الميزان بصيغة "p/q" مثلاً "4/4" تعني 4/4. نستخرج البسط والمقام
    ميزان_أجزاء = split (بيانات_الإيقاع[3], "/")
    لو طول(ميزان_أجزاء) = 2
        بسط = عدد(ميزان_أجزاء[1])
        مقام = عدد(ميزان_أجزاء[2])   // عادة 4 أو 8
    لا 
        بسط = 4
        مقام = 4
    تم
    
    // زمن النبضة الواحدة بالثواني (سرعة BPM تعني نبضة ربع في الدقيقة)
    // لكن بعض الإيقاعات قد تكون على أساس النبضة = قيمة المقام (مثلاً 8/4 تعني النبضة نصف ثانية؟)
    // نتبع المعيار: BPM تعني عدد النبضات ربع (quarter notes) في الدقيقة.
    // إذا كان الميزان 8/4، فإن النبضة هي 1/4 (ربع) أيضاً. لذا زمن النبضة = 60/سرعة_بي_ام_بي
    زمن_النبضة = 60.0 / سرعة_بي_ام_بي   // ثانية
    
    // طول الدورة الواحدة = عدد_الضربات * زمن_النبضة (لكل ضربة تمثل نبضة واحدة)
    مدة_الدورة = عدد_الضربات * زمن_النبضة
    
    // المدة الإجمالية
    مدة_الإجمالية = مدة_الدورة * عدد_الدورات
    عدد_العينات_الإجمالي = السابق(مدة_الإجمالية * معدل_العينات)
    موجة_كاملة = قائمة(عدد_العينات_الإجمالي)
    من س   = 1 إلى   عدد_العينات_الإجمالي
        موجة_كاملة[س] = 0
    دور
    
    // توليد الدورات
    من دورة = 0 إلى   عدد_الدورات - 1
        بداية_الدورة_عينة = دورة * مدة_الدورة * معدل_العينات
        من موضع = 1 إلى   عدد_الضربات
            رمز = ضربات[موضع]
            لو رمز != "سكتة"
                // تحديد مدة الضربة بناءً على زمن النبضة (لكن أقل قليلاً)
                مدة_الضربة = زمن_النبضة * 0.9
                موجة_الضربة = احصل_موجة_ضربة(رمز, مدة_الضربة, 0.8)
                عدد_عينات_الضربة = طول(موجة_الضربة)
                بداية_الضربة_عينة = بداية_الدورة_عينة + (موضع - 1) * زمن_النبضة * معدل_العينات
                بداية_صحيح = السابق(بداية_الضربة_عينة)
                من س   = 1 إلى   عدد_عينات_الضربة
                    لو بداية_صحيح + س    <= عدد_العينات_الإجمالي
                        موجة_كاملة[بداية_صحيح + س   ] = موجة_كاملة[بداية_صحيح + س   ] + موجة_الضربة[س]
                        لو موجة_كاملة[بداية_صحيح + س   ] > 32767
                            موجة_كاملة[بداية_صحيح + i] = 32767
                        إذا  موجة_كاملة[بداية_صحيح + س   ] < -32768
                            موجة_كاملة[بداية_صحيح + س   ] = -32768
                        تم
                    تم
                دور
            تم
            // السكتة: لا نفعل شيئاً (يبقى صامتاً)
        دور
    دور
    
    مرر  موجة_كاملة
تم


// --------------------- 5. دالة كتابة ملف WAV ---------------------
دالة  اكتب_ملف_صوتي(اسم_الملف, موجة)
    ملف = فتح_ملف(اسم_الملف, "wb")
    لو ملف = فارغ
        شوف "خطأ: لا يمكن إنشاء " + اسم_الملف + سطر 
        مرر  false
    تم
    عدد_العينات = طول(موجة)
    حجم_البيانات = عدد_العينات * 2
    حجم_الملف = 36 + حجم_البيانات
    
    صنع_ملف(ملف, "RIFF")
    صنع_ملف(ملف, رمز(حجم_الملف & 0xFF))
    صنع_ملف(ملف, رمز((حجم_الملف >> 8) & 0xFF))
    صنع_ملف(ملف, رمز((حجم_الملف >> 16) & 0xFF))
    صنع_ملف(ملف, رمز((حجم_الملف >> 24) & 0xFF))
    صنع_ملف(ملف, "WAVE")
    صنع_ملف(ملف, "fmt ")
    صنع_ملف(ملف, رمز(16)) صنع_ملف(ملف, رمز(0)) صنع_ملف(ملف, رمز(0)) صنع_ملف(ملف, رمز(0))
    صنع_ملف(ملف, رمز(1)) صنع_ملف(ملف, رمز(0))   // PCM
    صنع_ملف(ملف, رمز(1)) صنع_ملف(ملف, رمز(0))   // Mono
    // SampleRate
    صنع_ملف(ملف, رمز(معدل_العينات & 0xFF))
    صنع_ملف(ملف, رمز((معدل_العينات >> 8) & 0xFF))
    صنع_ملف(ملف, رمز((معدل_العينات >> 16) & 0xFF))
    صنع_ملف(ملف, رمز((معدل_العينات >> 24) & 0xFF))
    // ByteRate
    بايت_معدل = معدل_العينات * 1 * 2
    صنع_ملف(ملف, رمز(بايت_معدل & 0xFF))
    صنع_ملف(ملف, رمز((بايت_معدل >> 8) & 0xFF))
    صنع_ملف(ملف, رمز((بايت_معدل >> 16) & 0xFF))
    صنع_ملف(ملف, رمز((بايت_معدل >> 24) & 0xFF))
    // BlockAlign
    صنع_ملف(ملف, رمز(2)) صنع_ملف(ملف, رمز(0))
    // BitsPerSample
    صنع_ملف(ملف, رمز(16)) صنع_ملف(ملف, رمز(0))
    // Data chunk
    صنع_ملف(ملف, "data")
    صنع_ملف(ملف, رمز(حجم_البيانات & 0xFF))
    صنع_ملف(ملف, رمز((حجم_البيانات >> 8) & 0xFF))
    صنع_ملف(ملف, رمز((حجم_البيانات >> 16) & 0xFF))
    صنع_ملف(ملف, رمز((حجم_البيانات >> 24) & 0xFF))
    
    من عينة في موجة
        لو عينة > 32767 عينة = 32767 تم
        لو عينة < -32768 عينة = -32768 تم
        ن = عينة & 0xFFFF
        صنع_ملف(ملف, رمز(ن & 0xFF))
        صنع_ملف(ملف, رمز((ن >> 8) & 0xFF))
    دور
    غلق_ملف(ملف)
    مرر  true
تم

// --------------------- 6. تطبيق كل الإيقاعات ---------------------
دالة  توليد_كل_الإيقاعات(مجلد_الخرج)
    makeDir(مجلد_الخرج)
    شوف "بدء توليد " + كلم(طول(الإيقاعات)) + " إيقاع...\n"
    من إيقاع في الإيقاعات
        اسم = إيقاع[1]
        سرعة_وسط = السابق((إيقاع[8] + إيقاع[9]) / 2)
        شوف "توليد: " + اسم + " (سرعة " + كلم(سرعة_وسط) + " BPM) ... "
        موجة = توليد_إيقاع_كامل(إيقاع, سرعة_وسط, 4)   // 4 دورات
        اسم_ملف = مجلد_الخرج + "/" + اسم + ".wav"
        // استبدال المسافات والأقواس لجعل اسم الملف صالحاً
        اسم_ملف = str2hex(اسم_ملف)   // تبسيطاً نستخدم الاسم كما هو لكن Ring يتعامل مع المسافات
        // نستخدم الاسم المباشر مع التنبيه
        لو اكتب_ملف_صوتي(اسم_ملف, موجة)
            شوف "تم\n"
        لا 
            شوف "فشل\n"
        تم
    دور
    شوف "تم الانتهاء من توليد جميع الإيقاعات في مجلد: " + مجلد_الخرج + "\n"
تم

// لتحويل الاسم إلى صيغة صالحة للملف (إزالة المسافات أو استبدالها بشرطة)
دالة  تنظيف_اسم_ملف(اسم)
    اسم_نظيف = ""
    من س   = 1 إلى   طول(اسم)
        حرف = اسم[س]
        لو حرف = " " || حرف = "(" || حرف = ")" || حرف = "/"
            اسم_نظيف += "_"
        لا 
            اسم_نظيف += حرف
        تم
    دور
    مرر  اسم_نظيف
تم

// تعديل دالة التوليد لاستخدام التنظيف
دالة  توليد_كل_الإيقاعات_نظيف(مجلد_الخرج)
    makeDir(مجلد_الخرج)
    شوف "بدء توليد " + كلم(طول(الإيقاعات)) + " إيقاع...\n"
    من إيقاع في الإيقاعات
        اسم = إيقاع[1]
        سرعة_وسط = السابق((إيقاع[8] + إيقاع[9]) / 2)
        شوف "توليد: " + اسم + " (سرعة " + كلم(سرعة_وسط) + " BPM) ... "
        موجة = توليد_إيقاع_كامل(إيقاع, سرعة_وسط, 4)
        اسم_نظيف = تنظيف_اسم_ملف(اسم)
        اسم_ملف = مجلد_الخرج + "/" + اسم_نظيف + ".wav"
        لو اكتب_ملف_صوتي(اسم_ملف, موجة)
            شوف "تم حفظ " + اسم_ملف + "\n"
        لا 
            شوف "خطأ في حفظ " + اسم_ملف + "\n"
        تم
    دور
    شوف "تم.\n"
تم

    const filename = 'طبل.ض';
    const statusMessageElement = document.getElementById('statusMessage');

    // عرض المحتوى في منطقة العرض عند تحميل الصفحة
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('fileContentDisplay').textContent = fileContent;
    });

    function showStatusMessage(message) {
        statusMessageElement.textContent = message;
        statusMessageElement.style.display = 'block';
        setTimeout(() => {
            statusMessageElement.style.display = 'none';
        }, 3000); // إخفاء الرسالة بعد 3 ثوانٍ
    }

    async function copyContent() {
        try {
            await navigator.clipboard.writeText(fileContent);
            showStatusMessage('تم نسخ المحتوى بنجاح!');
        } catch (err) {
            console.error('فشل في نسخ المحتوى: ', err);
            showStatusMessage('فشل في نسخ المحتوى.');
        }
    }

    function downloadFile() {
        const blob = new Blob([fileContent], { type: 'text/plain;charset=utf-8' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(a.href);
        showStatusMessage('جاري تنزيل الملف...');
    }
</script>
