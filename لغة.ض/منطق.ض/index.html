    أسماء_المتغيرات = []
    قيم_المتغيرات = []

    الدالة ضع اسم_متغير, قيمة
        من i = 1 إلى طول(أسماء_المتغيرات)
            لو أسماء_المتغيرات[i] = اسم_متغير
                قيم_المتغيرات[i] = قيمة
                مرر
            تم
        دور
        ضف(أسماء_المتغيرات, اسم_متغير)
        ضف(قيم_المتغيرات, قيمة)
    مرر

    الدالة عرض اسم_متغير
        من i = 1 إلى طول(أسماء_المتغيرات)
            لو أسماء_المتغيرات[i] = اسم_متغير
                مرر قيم_المتغيرات[i]
            تم
        دور
        مرر ""

        من i = 1 إلى طول(أسماء_المتغيرات)

        النتائج = []

        # 1. الحقائق المباشرة

        الشرط = الشروط[فهرس]

            المسند = الشرط[2]

                                خرج
                            لا
                                بيئة_جديدة.ضع(وسيط_شرط, قيمة_حقيقة)
                            تم
                        لا
                            لو وسيط_شرط != قيمة_حقيقة
                                متطابق = 0
                                خرج
                            تم
                        تم
                    دور
                    لو متطابق
                        نفذ_شرط(فهرس+1, الشروط, بيئة_جديدة, إجراء, النتائج)
                    تم
                تم
            دور

        إذا النوع = "ليس"
            قيمة1 = حل_القيمة(الشرط[2], بيئة)
            قيمة2 = حل_القيمة(الشرط[3], بيئة)
            لو قيمة1 != قيمة2
                نفذ_شرط(فهرس+1, الشروط, بيئة, إجراء, النتائج)
            تم

        إذا النوع = "يساوي"
            قيمة1 = حل_القيمة(الشرط[2], بيئة)
            قيمة2 = حل_القيمة(الشرط[3], بيئة)
            لو قيمة1 = قيمة2
                نفذ_شرط(فهرس+1, الشروط, بيئة, إجراء, النتائج)
            تم

        إذا النوع = "أو"
            شروط_إما = []
            من i = 2 إلى طول(الشرط)
                ضف(شروط_إما, الشرط[i])
            دور

            نتائج_الفروع = []
            من شرط_فرعي في شروط_إما
                بيئة_فرعية = بيئة.نسخة()
                نفذ_شرط(1, [شرط_فرعي], بيئة_فرعية, "", نتائج_الفروع)
            دور

            من بيئة_فرع في نتائج_الفروع
                نفذ_شرط(فهرس+1, الشروط, بيئة_فرع, إجراء, النتائج)
            دور

        إذا النوع = "و"
            شروط_ثما = []
            من i = 2 إلى طول(الشرط)
                ضف(شروط_ثما, الشرط[i])
            دور
            شروط_متبقية = []
            من ج = فهرس+1 إلى طول(الشروط)
                ضف(شروط_متبقية, الشروط[ج])
            دور

            # معالجة و بشكل تسلسلي
            البيئات_الحالية = [بيئة]
            من شرط_فرعي في شروط_ثما
                بيئات_جديدة = []
                من ب في البيئات_الحالية
                    نتائج_فرعية = []
                    نفذ_شرط(1, [شرط_فرعي], ب, "", نتائج_فرعية)
                    من ن_نتيجة في نتائج_فرعية
                        ضف(بيئات_جديدة, ن_نتيجة)
                    دور
                دور
                البيئات_الحالية = بيئات_جديدة
                لو طول(البيئات_الحالية) = 0
                    مرر
                تم
            دور
            # بعد نجاح جميع الشروط الفرعية، نكمل مع الشروط المتبقية
            من ب في البيئات_الحالية

        الحرف_الأول = يحتوي(نص, 1, 1)
        لو ترميز(الحرف_الأول) >= ترميز("A") && ترميز(الحرف_الأول) <= ترميز("Z") || الحرف_الأول  = "#"

        تم

        مرر 0
    مرر

    const filename = 'منطق.ض';
    const statusMessageElement = document.getElementById('statusMessage');

    // عرض المحتوى في منطقة العرض عند تحميل الصفحة
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('fileContentDisplay').textContent = fileContent;
    });

    function showStatusMessage(message) {
        statusMessageElement.textContent = message;
        statusMessageElement.style.display = 'block';
        setTimeout(() => {
            statusMessageElement.style.display = 'none';
        }, 3000); // إخفاء الرسالة بعد 3 ثوانٍ
    }

    async function copyContent() {
        try {
            await navigator.clipboard.writeText(fileContent);
            showStatusMessage('تم نسخ المحتوى بنجاح!');
        } catch (err) {
            console.error('فشل في نسخ المحتوى: ', err);
            showStatusMessage('فشل في نسخ المحتوى.');
        }
    }

    function downloadFile() {
        const blob = new Blob([fileContent], { type: 'text/plain;charset=utf-8' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(a.href);
        showStatusMessage('جاري تنزيل الملف...');
    }
</script>
